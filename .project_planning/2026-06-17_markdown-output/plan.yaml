steps:
  - id: step-1
    title: Add Turndown dependencies
    scope: |
      Install turndown and turndown-plugin-gfm as production dependencies via pnpm.
    files:
      - package.json
      - pnpm-lock.yaml
    constraints:
      - Use exact versions pinned by pnpm
      - No native modules — both must be pure JS
    acceptance:
      - turndown and turndown-plugin-gfm appear in package.json dependencies
      - pnpm install --frozen-lockfile succeeds after lockfile update
    verification:
      - "pnpm install --frozen-lockfile"

  - id: step-2
    title: Add CONTENT_FORMAT config option
    scope: |
      Add CONTENT_FORMAT env var support to config.js. Valid values: "markdown", "html".
      Default: "markdown". Parsed and validated alongside existing config options.
    files:
      - src/config.js
    constraints:
      - Follow existing config parsing patterns (parseBoolean, parseInteger style)
      - Invalid values must throw with a descriptive message listing valid options
      - Add to DEFAULTS object
    acceptance:
      - loadConfig() returns contentFormat field
      - validateConfig() validates contentFormat
      - Invalid CONTENT_FORMAT values throw descriptive error
      - Default is "markdown"
    verification:
      - "pnpm lint:fix"
      - "pnpm test"

  - id: step-3
    title: Add contentFormat request parameter with validation
    scope: |
      Accept optional contentFormat in POST / request body. Validate against allowed
      values ("markdown", "html"). Invalid values return 400 with descriptive error
      listing valid options. Falls back to server config default when omitted.
    files:
      - src/app.js
    depends_on:
      - step-2
    constraints:
      - 400 error message must echo valid options
      - Follow existing request validation patterns
      - Do not change error envelope shape
    acceptance:
      - Valid contentFormat values accepted
      - Missing contentFormat uses server config default
      - Invalid contentFormat returns 400 with descriptive message
    verification:
      - "pnpm lint:fix"
      - "pnpm test"

  - id: step-4
    title: Create markdown converter module
    scope: |
      New module src/markdown.js that initializes Turndown with GFM plugin and custom
      media embed rules. Exports a function that converts sanitized HTML to markdown.

      Custom Turndown rules:
      - iframe: pattern-match src against known embed domains (YouTube, Vimeo,
        Dailymotion, etc.) → [Video: Provider](url). Unknown iframes → [Embedded content](url).
      - video: convert to [Video](src).

      Module creates a single Turndown instance (reusable, stateless per conversion).
    files:
      - src/markdown.js
    constraints:
      - Single shared Turndown instance, not per-request
      - Known embed domain list should be easy to extend
      - Pure function: sanitized HTML string in, markdown string out
    acceptance:
      - Converts standard article HTML (headings, paragraphs, lists, links, images, bold, italic, blockquotes, code) to clean markdown
      - YouTube/Vimeo/Dailymotion iframes become labeled video links
      - Unknown iframes become generic embedded content links
      - Video tags become video links
      - GFM tables convert correctly
    verification:
      - "pnpm lint:fix"
      - "pnpm test"

  - id: step-5
    title: Wire conversion into response pipeline
    scope: |
      Modify POST / handler in app.js to apply markdown conversion when contentFormat
      is "markdown". Pipeline: HTML → DOMPurify sanitize → convert to markdown (if needed).
      When contentFormat is "html", existing behavior (sanitize only).

      Update response.js if mapArticleResponse needs awareness of content format.
    files:
      - src/app.js
      - src/response.js
    depends_on:
      - step-3
      - step-4
    constraints:
      - Sanitization ALWAYS runs regardless of format
      - Conversion happens after sanitization
      - Do not change response field set
    acceptance:
      - Default requests return markdown content
      - contentFormat=html returns sanitized HTML (existing behavior)
      - contentFormat=markdown returns sanitized-then-converted markdown
      - All other response fields unchanged
    verification:
      - "pnpm lint:fix"
      - "pnpm test"

  - id: step-6
    title: Add tests for markdown output and contentFormat param
    scope: |
      Add test coverage for:
      - Default response returns markdown content
      - contentFormat=html returns HTML content
      - contentFormat=markdown explicitly returns markdown
      - Invalid contentFormat returns 400 with descriptive error
      - Media embed conversion (iframe → video link, video tag → link)
      - GFM table conversion
      - Config parsing for CONTENT_FORMAT env var
      - Sanitization still runs before markdown conversion (script tags, event handlers stripped)
    files:
      - test/app.test.js
    depends_on:
      - step-5
    constraints:
      - Follow existing test patterns (node:test, supertest, fixture servers)
      - Test both formats explicitly, don't rely on default alone
      - Verify sanitization + conversion interaction
    acceptance:
      - All new tests pass
      - Existing tests updated where content assertions assumed HTML
      - No test regressions
    verification:
      - "pnpm lint:fix"
      - "pnpm test"

  - id: step-7
    title: Update documentation
    scope: |
      Update README.md with:
      - contentFormat request parameter documentation
      - CONTENT_FORMAT env var documentation
      - Updated example request/response showing markdown output
      - Note about backward compatibility (CONTENT_FORMAT=html)

      Update examples/compose.yaml if env vars are documented there.
    files:
      - README.md
      - examples/compose.yaml
    depends_on:
      - step-6
    constraints:
      - Follow existing README structure and style
      - Document breaking change clearly
    acceptance:
      - README documents contentFormat param and CONTENT_FORMAT env var
      - Compose example shows CONTENT_FORMAT option
    verification:
      - "pnpm lint:fix"
      - "pnpm test"
