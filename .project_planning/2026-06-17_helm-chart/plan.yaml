steps:
  - id: step-1
    title: Add health endpoint and tests
    scope: Add a lightweight `GET /healthz` endpoint to the Express app and cover it with tests while preserving the existing `POST /` API and `GET /` 400 guidance.
    files:
      - src/app.js
      - test/validation.test.js
      - README.md
    constraints:
      - Do not change the success response field set from `src/response.js`.
      - Do not change the error envelope or status-code contract.
      - Keep `GET /` returning the existing 400 guidance.
      - Keep the endpoint lightweight; it must not perform upstream fetches or parse work.
    acceptance:
      - `GET /healthz` returns a successful JSON response suitable for health probes.
      - Existing `GET /` guidance still returns 400.
      - Health endpoint behavior is documented.
    verification:
      - pnpm lint
      - pnpm test

  - id: step-2
    title: Add Docker Compose healthcheck
    scope: Wire the new health endpoint into the example Compose deployment.
    files:
      - examples/compose.yaml
      - README.md
    constraints:
      - Use the same health path selected for Kubernetes probes.
      - Do not require additional services or persistent state.
      - Ensure the command works with the published container image contents.
    acceptance:
      - Compose example includes a healthcheck for the service.
      - Documentation mentions the healthcheck and endpoint.
    verification:
      - pnpm lint
      - pnpm test

  - id: step-3
    title: Create production-usable Helm chart
    scope: Add a Helm chart for the service with conventional metadata, values, helpers, and Kubernetes manifests for Deployment, Service, optional Ingress, optional HPA, and optional PDB.
    files:
      - charts/readability-js-server/Chart.yaml
      - charts/readability-js-server/values.yaml
      - charts/readability-js-server/templates/_helpers.tpl
      - charts/readability-js-server/templates/deployment.yaml
      - charts/readability-js-server/templates/service.yaml
      - charts/readability-js-server/templates/ingress.yaml
      - charts/readability-js-server/templates/hpa.yaml
      - charts/readability-js-server/templates/pdb.yaml
      - charts/readability-js-server/templates/serviceaccount.yaml
      - charts/readability-js-server/templates/NOTES.txt
      - charts/readability-js-server/README.md
    constraints:
      - Start chart `version` at `0.1.0`.
      - Set `appVersion` and default image tag to the current package version, `1.8.0`.
      - Default image repository must be `phpdockerio/readability-js-server`.
      - Default container port must match the service default, `3000`.
      - Use `/healthz` for readiness and liveness probes.
      - Keep optional resources disabled unless their values enable them.
      - Expose mature chart configuration: security contexts, resource requests and limits, ingress class/annotations/TLS, HPA behavior and scaling knobs, PDB settings, pod labels/annotations, service account settings, image pull secrets, node selectors, tolerations, affinity, topology spread constraints, priority class, and probe tuning.
      - Support environment variables already accepted by `src/config.js`.
    acceptance:
      - Chart renders successfully with default values.
      - Default manifests deploy one replica behind a ClusterIP Service.
      - Ingress, HPA, and PDB templates render only when enabled.
      - Users can configure common Kubernetes policy and scheduling requirements without forking the chart.
      - Chart README documents installation, values, versioning policy, and Artifact Hub expectations.
    verification:
      - helm lint charts/readability-js-server
      - helm template readability-js-server charts/readability-js-server
      - pnpm lint
      - pnpm test

  - id: step-4
    title: Add Helm verification tooling
    scope: Add Makefile and CI support for chart linting and rendering so Helm regressions are checked consistently.
    files:
      - Makefile
      - .github/workflows/build-publish.yaml
      - README.md
      - AGENTS.md
    constraints:
      - Preserve existing Node 24 and pnpm 11.7.0 policy.
      - Keep existing `pnpm lint` and `pnpm test` checks.
      - Use official or widely adopted Helm setup actions in CI.
      - Do not require a Kubernetes cluster for verification.
    acceptance:
      - Local chart verification commands are documented and available through Makefile.
      - CI checks Helm lint/template in addition to existing lint/test.
      - Repo instructions mention the new Helm verification commands.
    verification:
      - make helm-lint
      - make helm-template
      - pnpm lint
      - pnpm test

  - id: step-5
    title: Add chart publishing and Artifact Hub metadata
    scope: Add GitHub Pages/chart-releaser publishing support and metadata/documentation needed for Artifact Hub indexing.
    files:
      - .github/workflows/chart-release.yaml
      - charts/readability-js-server/Chart.yaml
      - charts/readability-js-server/README.md
      - artifacthub-repo.yml
      - README.md
    constraints:
      - Artifact Hub should reference the external Helm repository; do not attempt to upload charts directly to Artifact Hub.
      - Keep Docker image publishing tag-driven through the existing release workflow.
      - Chart publishing should run from chart changes on `master` or an explicit manual trigger.
      - Do not introduce OCI publishing unless the maintainer changes the publishing target.
    acceptance:
      - Chart release workflow packages changed charts and publishes an indexable Helm repository via GitHub Pages.
      - README explains how users add the Helm repo and install the chart.
      - Artifact Hub metadata is present enough to support repository registration/ownership.
      - Release/versioning documentation explains when to bump chart `version` versus `appVersion`.
    verification:
      - helm lint charts/readability-js-server
      - helm template readability-js-server charts/readability-js-server
      - helm package charts/readability-js-server --destination /tmp/readability-js-server-chart
      - pnpm lint
      - pnpm test
