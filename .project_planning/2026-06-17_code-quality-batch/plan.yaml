steps:
  - id: step-1
    title: "Signal handling and graceful shutdown (#60)"
    scope: |
      Add SIGINT/SIGTERM handlers to server.js for graceful shutdown (close HTTP server,
      then exit). Add tini as PID 1 in Dockerfile via ENTRYPOINT. Verify ctrl+c works
      in container.
    files:
      - src/server.js
      - Dockerfile
    constraints:
      - Must handle both SIGINT and SIGTERM
      - Must close the HTTP server before exiting (drain active connections)
      - Tini must be installed from Alpine repos (apk add --no-cache tini)
      - Use ENTRYPOINT ["/sbin/tini", "--"] with CMD ["node", "src/server.js"]
      - Log shutdown to stdout using the existing logger
    acceptance:
      - Container responds to single ctrl+c and exits cleanly
      - Process exits with code 0 on graceful shutdown
      - Active requests complete before shutdown (within a timeout)
    verification:
      - pnpm test
      - docker build -t readability-js .
      - "docker run --rm -p3000:3000 readability-js (then ctrl+c — must exit cleanly)"

  - id: step-2
    title: "ESLint setup and enforcement (#61)"
    scope: |
      Install ESLint with flat config. Create eslint.config.cjs with @eslint/js recommended,
      eslint-plugin-n for Node rules, eslint-config-prettier to avoid conflicts. Update
      pnpm lint to run both eslint and prettier. Fix all violations.
    files:
      - package.json
      - eslint.config.cjs (new)
      - src/app.js
      - src/config.js
      - src/logger.js
      - src/markdown.js
      - src/response.js
      - src/server.js
      - test/app.test.js
      - scripts/memory-soak.js
    constraints:
      - Use flat config format (eslint.config.cjs for CommonJS)
      - eslint-config-prettier must be last in config array
      - Do not use eslint-plugin-prettier (run tools separately)
      - "pnpm lint" must run both eslint and prettier check
      - "pnpm lint:fix" must run both eslint --fix and prettier --write
      - Do not change code behavior — lint fixes only
      - Add eslint to CI (already covered by pnpm lint)
    acceptance:
      - pnpm lint passes with zero violations
      - ESLint config covers src/, test/, scripts/
      - Node-specific rules active via eslint-plugin-n
    verification:
      - pnpm lint
      - pnpm test

  - id: step-3
    title: "Reorganise and break down tests (#62)"
    scope: |
      Split test/app.test.js into focused test files by theme. Create shared test
      helpers (createTestApp, createFixtureServer, etc.) in a test helper file.
      Add HTML fixture files for integration tests. Analyse coverage gaps and add
      new tests for uncovered edge cases.
    files:
      - test/app.test.js (split into multiple files)
      - test/helpers.js (new — shared test utilities)
      - test/validation.test.js (new — input validation, URL schemes, malformed URLs)
      - test/fetch-errors.test.js (new — timeouts, network errors, HTTP errors, oversized responses, non-HTML)
      - test/security.test.js (new — SSRF/private network blocking, sanitization, XSS)
      - test/redirects.test.js (new — redirect following, redirect loops, redirect-to-private)
      - test/parsing.test.js (new — successful article parsing, response fields, content format)
      - test/markdown.test.js (new — markdown conversion, iframes, video, tables, GFM)
      - test/config.test.js (new — config loading, validation, defaults, env vars)
      - test/concurrency.test.js (new — concurrency gate, 429 responses)
      - test/fixtures/ (new directory — HTML fixture files)
    constraints:
      - All existing tests must pass after reorganization (no test logic changes initially)
      - "node --test" must discover all test files (test/*.test.js glob)
      - Shared helpers must not export test cases, only utilities
      - New tests must not change the HTTP contract or app behavior
      - HTML fixtures should exercise realistic cross-section of article types
      - Do not duplicate test coverage — move tests, don't copy
    acceptance:
      - Zero test files over 200 lines
      - All original test scenarios preserved
      - New edge case tests added (coverage gaps identified and plugged)
      - pnpm test discovers and runs all test files
    verification:
      - pnpm test
      - pnpm lint

  - id: step-4
    title: "Tag-based versioning and CI (#55)"
    scope: |
      Remove release file. Read version from package.json in server.js and Dockerfile.
      Create new tag-triggered workflow for Docker build+push and GitHub Release creation.
      Update existing CI workflow to remove release-file logic. Update Makefile and docs.
    files:
      - src/server.js
      - Dockerfile
      - package.json
      - .github/workflows/build-publish.yaml
      - .github/workflows/release.yaml (new — tag-triggered)
      - release (delete)
      - Makefile
      - README.md
      - AGENTS.md
    constraints:
      - package.json version field is single source of truth
      - Tag format is v* (e.g. v2.0.0)
      - Release workflow triggers on push of v* tags only
      - Docker tags derived from semver — full (2.0.0), minor (2.0), major (2), latest
      - GitHub Release created with --generate-notes (same as steiner)
      - Existing build-publish.yaml keeps running lint+test on PR/push to master
      - build-publish.yaml no longer builds/pushes Docker images (moved to release workflow)
      - Do not break existing CI for PRs
    acceptance:
      - release file removed from repo
      - server.js reads version from package.json
      - Dockerfile no longer copies release file
      - Tag push triggers Docker build+push with correct tags
      - Tag push creates GitHub Release with auto-generated notes
      - PR/push CI still runs lint + test
    verification:
      - pnpm test
      - pnpm lint
      - docker build -t readability-js .
      - "Manually verify workflow YAML syntax"
