steps:
  - id: step-1
    title: Upgrade GitHub Actions versions
    scope: >
      Bump all action version tags in both workflow files to latest major versions.
      build-publish.yaml: checkout v4→v6, setup-node v4→v5, setup-qemu-action v3→v4,
      setup-buildx-action v3→v4, login-action v3→v4, build-push-action v6→v7.
      codeql-analysis.yml: checkout v4→v6, codeql-action/*@v3→v4.
    files:
      - .github/workflows/build-publish.yaml
      - .github/workflows/codeql-analysis.yml
    constraints:
      - Only change version tags, no workflow logic changes
      - Keep tj-actions/changed-files@v46 as-is (already latest)
    acceptance:
      - All action references use latest major version tags
      - YAML remains valid
      - No workflow logic changed
    verification:
      - Visual diff review of version tags only
      - Lint passes (pnpm lint)

  - id: step-2
    title: Add compose example
    scope: >
      Create examples/compose.yaml with phpdockerio/readability-js-server:latest,
      port mapping 3000:3000, and commented env var examples from config.js.
    files:
      - examples/compose.yaml
    constraints:
      - Use image from registry, not local build
      - Include all env vars from README config table with sensible defaults
      - Follow compose spec (compose.yaml not docker-compose.yml)
    acceptance:
      - File exists at examples/compose.yaml
      - References phpdockerio/readability-js-server:latest
      - Exposes port 3000
      - Shows configurable env vars
      - Passes docker compose config validation
    verification:
      - docker compose -f examples/compose.yaml config

  - id: step-3
    title: Update README with compose reference
    depends_on: [step-2]
    scope: >
      Add a short section or line in README.md pointing users to examples/compose.yaml
      for running via Docker Compose.
    files:
      - README.md
    constraints:
      - Keep it brief — reference the file, don't duplicate its contents
      - Place near existing Docker section
    acceptance:
      - README mentions examples/compose.yaml
      - No unrelated README changes
    verification:
      - pnpm lint
      - pnpm test
