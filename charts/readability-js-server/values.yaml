replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: phpdockerio/readability-js-server
  pullPolicy: IfNotPresent
  tag: "1.8.0"

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  labels: {}
  automountServiceAccountToken: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

priorityClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
terminationGracePeriodSeconds: 30

containerPort: null

service:
  type: ClusterIP
  port: 3000
  annotations: {}
  labels: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

appConfig:
  PORT: 3000
  REQUEST_BODY_LIMIT: 16kb
  FETCH_TIMEOUT_MS: 10000
  FETCH_MAX_BYTES: 5242880
  FETCH_MAX_REDIRECTS: 5
  BLOCK_PRIVATE_NETWORKS: true
  READABILITY_MAX_ELEMS: null
  MAX_CONCURRENT_REQUESTS: 10
  CONTENT_FORMAT: markdown

probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 3
  readiness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 3
  startup:
    enabled: false
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 30

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: readability-js-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  metrics: []
  behavior: {}

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: null
